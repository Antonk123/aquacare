<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e8ecf0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-title" content="AquaCare" />
    <title>AquaCare</title>
    <script>
      // Apply saved mood before first paint to prevent flash
      (function () {
        try {
          var mood = localStorage.getItem('aquacare_mood') || 'hammam';
          document.documentElement.setAttribute('data-mood', mood);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.content = mood === 'onsen' ? '#1a1610' : mood === 'terme' ? '#ede5d4' : '#e8ecf0';
        } catch (e) {
          document.documentElement.setAttribute('data-mood', 'hammam');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
      }
    </script>
  </body>
</html>
